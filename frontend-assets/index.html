  <!-- Supabase Auth Invite Handler -->
  <script>
  (function() {
    const hash = window.location.hash;
    if (hash && hash.includes('access_token=')) {
      const params = new URLSearchParams(hash.substring(1));
      const token = params.get('access_token');
      if (token) {
        window.location.href = '/api/admin/auth/accept-invite?token=' + encodeURIComponent(token);
        return;
      }
    }
  })();

  <!-- ── PWA: Service Worker + Install Prompt ─────────────────── -->
  <style>
    #pwa-prompt {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(120px);
      z-index: 99999;
      width: calc(100vw - 32px);

      pointer-events: none;
      border: 1.5px solid rgba(45,106,45,0.12);
    }
    #pwa-prompt.visible {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
      pointer-events: auto;
    }
    #pwa-prompt .pwa-header {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    #pwa-prompt .pwa-icon {
      width: 56px;
      height: 56px;

      object-fit: cover;
      flex-shrink: 0;
      box-shadow: 0 2px 10px rgba(45,106,45,0.2);
    }
    #pwa-prompt .pwa-text-block {
      flex: 1;
    }
    #pwa-prompt .pwa-title {
      font-family: Inter, sans-serif;
      font-weight: 800;
      font-size: 16px;
      color: #1a4d1a;
      margin: 0 0 3px;
      line-height: 1.2;
    }
    #pwa-prompt .pwa-sub {
      font-family: Inter, sans-serif;
      font-size: 13px;
      color: #666;
      margin: 0;
      line-height: 1.45;
    }
    #pwa-prompt .pwa-badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    #pwa-prompt .pwa-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #f0faf0;
      border: 1px solid #c8e6c8;
      border-radius: 20px;
      padding: 4px 10px;
      font-family: Inter, sans-serif;
      font-size: 12px;
      color: #2d6a2d;
      font-weight: 600;

      border: none;
      border-radius: 12px;
      padding: 13px 20px;
      font-family: Inter, sans-serif;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: opacity 0.2s;
    }
    #pwa-prompt .pwa-btn-install:hover { opacity: 0.9; }
    #pwa-prompt .pwa-btn-later {

    /* iOS manual-install variant */

      padding: 10px 12px;
      font-family: Inter, sans-serif;
      font-size: 13px;
      color: #2d6a2d;

    #pwa-prompt.ios-mode .pwa-actions { display: none; }

      padding: 12px;
      font-family: Inter, sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 4px;
    }
  </style>

    <button class="pwa-ios-close" id="pwa-ios-close-btn" style="display:none">Got it!</button>

  <script>
  (function() {
    var DISMISS_KEY = 'zarii_pwa_dismissed';
    var INSTALL_KEY = 'zarii_pwa_installed';
    var deferredPrompt = null;
    var prompt = document.getElementById('pwa-prompt');
    var installBtn = document.getElementById('pwa-install-btn');
    var laterBtn = document.getElementById('pwa-later-btn');
    var iosCloseBtn = document.getElementById('pwa-ios-close-btn');

    function isDismissed() {
      var ts = localStorage.getItem(DISMISS_KEY);
      if (!ts) return false;
      return Date.now() - parseInt(ts, 10) < 30 * 24 * 60 * 60 * 1000; // 30 days
    }

    function isInstalled() {
      return localStorage.getItem(INSTALL_KEY) === '1' ||
        window.matchMedia('(display-mode: standalone)').matches ||
        window.navigator.standalone === true;
    }

    function showPrompt(isIOS) {
      if (isDismissed() || isInstalled()) return;
      if (isIOS) {
        prompt.classList.add('ios-mode');
        iosCloseBtn.style.display = 'block';
      }
      setTimeout(function() { prompt.classList.add('visible'); }, 3000);
    }

    function hidePrompt() {
      prompt.classList.remove('visible');
    }

    // Detect iOS Safari (no beforeinstallprompt support)
    var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream;
    var isSafari = /safari/i.test(navigator.userAgent) && !/chrome/i.test(navigator.userAgent);

    if (isIOS && isSafari) {
      showPrompt(true);
    }

    // Chrome / Android / Edge — standard install prompt
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      deferredPrompt = e;
      showPrompt(false);
    });

    installBtn.addEventListener('click', function() {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function(choice) {
        if (choice.outcome === 'accepted') {
          localStorage.setItem(INSTALL_KEY, '1');
        }
        deferredPrompt = null;
        hidePrompt();
      });
    });

    laterBtn.addEventListener('click', function() {
      localStorage.setItem(DISMISS_KEY, Date.now().toString());
      hidePrompt();
    });

    iosCloseBtn.addEventListener('click', function() {
      localStorage.setItem(DISMISS_KEY, Date.now().toString());
      hidePrompt();
    });

    window.addEventListener('appinstalled', function() {
      localStorage.setItem(INSTALL_KEY, '1');
      hidePrompt();
    });

    // Register service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js').catch(function(err) {
          console.warn('SW registration failed:', err);
        });
      });
    }
  })();
  </script>
